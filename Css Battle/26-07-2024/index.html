<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Battle Design</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background-color: #6592cf;
      }
      .center-circle {
        position: relative;
        width: 200px;
        height: 200px;
        background-color: #243d83;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .circle {
        position: absolute;
        width: 80px;
        height: 80px;
        background-color: #243d83;
        border-radius: 50%;
      }
      .circle.center {
        top: 50px;
        width: 100px;
        height: 100px;
        background-color: #6592cf;
      }
      .circle.top {
        top: -30px;
      }
      .circle.right {
        right: -30px;
      }
      .circle.bottom {
        bottom: -30px;
      }
      .circle.left {
        left: -30px;
      }
    </style>
  </head>
  <body>
    <div class="center-circle">
      <div class="circle center"></div>
      <div class="circle top"></div>
      <div class="circle right"></div>
      <div class="circle bottom"></div>
      <div class="circle left"></div>
    </div>
  </body>
</html>
